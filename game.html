<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Survivor Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', monospace; }
    canvas { display: block; cursor: crosshair; }

    /* ── OVERLAYS ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 10;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 14px;
    }
    .overlay.open { display: flex; }

    /* ── MENU PRINCIPAL ── */
    #menu-overlay h1 {
      font-size: 58px; letter-spacing: 6px; text-transform: uppercase;
      margin-bottom: 0;
    }
    #menu-overlay .title-top { color: #4ecca3; }
    #menu-overlay .title-bot { color: #e94560; }
    #menu-overlay .menu-subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }

    .color-section { text-align: center; margin-bottom: 10px; }
    .color-section label { color: #aaa; font-size: 13px; display: block; margin-bottom: 10px; letter-spacing: 1px; }
    .color-options { display: flex; gap: 12px; justify-content: center; }
    .color-opt {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      cursor: pointer; transition: all 0.2s;
    }
    .color-opt:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.5); }
    .color-opt.selected { border-color: #fff; box-shadow: 0 0 16px rgba(255,255,255,0.4); transform: scale(1.15); }

    .menu-btn {
      padding: 14px 50px; border-radius: 50px; border: 2px solid;
      font-size: 20px; font-weight: bold; cursor: pointer;
      transition: all 0.2s; text-transform: uppercase; letter-spacing: 3px;
      margin-top: 16px;
    }
    .btn-play {
      background: rgba(78,204,163,0.15); border-color: #4ecca3; color: #4ecca3;
    }
    .btn-play:hover {
      background: rgba(78,204,163,0.3); transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(78,204,163,0.3);
    }

    .menu-controls { color: #555; font-size: 12px; margin-top: 18px; }

    /* ── TIENDA ── */
    #shop-overlay h2 {
      color: #ffe55a; font-size: 34px; letter-spacing: 4px;
      text-transform: uppercase; margin-bottom: 2px;
      text-shadow: 0 0 20px rgba(255,229,90,0.4);
    }
    #shop-overlay .shop-subtitle { color: #aaa; font-size: 13px; margin-bottom: 10px; }
    #shop-overlay .shop-wave-info { color: #e94560; font-size: 12px; margin-bottom: 8px; }
    #shop-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .shop-card {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 20px 24px;
      width: 210px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .shop-card:hover {
      border-color: #ffe55a;
      background: rgba(255,229,90,0.08);
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(255,229,90,0.15);
    }
    .shop-card .card-icon { font-size: 36px; margin-bottom: 6px; }
    .shop-card .card-title { color: #fff; font-size: 15px; font-weight: bold; margin-bottom: 5px; }
    .shop-card .card-desc  { color: #aaa; font-size: 11px; line-height: 1.4; margin-bottom: 8px; }
    .shop-card .card-tag   {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: bold; letter-spacing: 1px;
    }
    .tag-weapon  { background: rgba(233,69,96,0.25); color: #e94560; }
    .tag-upgrade { background: rgba(78,204,163,0.25); color: #4ecca3; }
    .tag-heal    { background: rgba(245,166,35,0.25); color: #f5a623; }
    .tag-new     { background: rgba(100,180,255,0.25); color: #64b4ff; }
    .tag-skip    { background: rgba(255,255,255,0.08); color: #666; }

    /* ── GAME OVER ── */
    #gameover-overlay h2 { color: #e94560; font-size: 58px; letter-spacing: 4px; margin-bottom: 10px; }
    .go-stats {
      background: rgba(0,0,0,0.4); border-radius: 12px; padding: 16px 30px;
      margin-bottom: 14px; min-width: 380px;
    }
    .go-stat-row {
      display: flex; justify-content: space-between; padding: 5px 0;
      font-size: 14px;
    }
    .go-stat-row .go-label { color: #888; }
    .go-stat-row .go-value { color: #fff; font-weight: bold; }
    .go-buttons { display: flex; gap: 14px; margin-top: 10px; }
    .btn-retry {
      background: rgba(78,204,163,0.15); border-color: #4ecca3; color: #4ecca3;
      padding: 12px 36px; border-radius: 50px; border: 2px solid;
      font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s;
      letter-spacing: 1px;
    }
    .btn-retry:hover {
      background: rgba(78,204,163,0.3); transform: translateY(-2px);
    }
    .btn-menu {
      background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); color: #aaa;
      padding: 12px 36px; border-radius: 50px; border: 2px solid;
      font-size: 15px; cursor: pointer; transition: all 0.2s;
      letter-spacing: 1px;
    }
    .btn-menu:hover {
      background: rgba(255,255,255,0.1); color: #fff; transform: translateY(-2px);
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<!-- MENU PRINCIPAL -->
<div id="menu-overlay" class="overlay open">
  <h1 class="title-top">SURVIVOR</h1>
  <h1 class="title-bot">SHOOTER</h1>
  <div class="menu-subtitle">Sobrevive si puedes</div>
  <div class="color-section">
    <label>COLOR DEL PERSONAJE</label>
    <div class="color-options" id="color-options"></div>
  </div>
  <button class="menu-btn btn-play" onclick="startFromMenu()">JUGAR</button>
  <div class="menu-controls">WASD mover &middot; RATON apuntar &middot; CLIC disparar &middot; 1-5 cambiar arma</div>
</div>

<!-- TIENDA -->
<div id="shop-overlay" class="overlay">
  <h2>TIENDA</h2>
  <div class="shop-subtitle">Oleada completada</div>
  <div class="shop-wave-info" id="shop-wave-info"></div>
  <div id="shop-cards"></div>
</div>

<!-- GAME OVER -->
<div id="gameover-overlay" class="overlay">
  <h2>GAME OVER</h2>
  <div class="go-stats" id="go-stats"></div>
  <div class="go-buttons">
    <button class="btn-retry" onclick="retryGame()">REINTENTAR</button>
    <button class="btn-menu" onclick="goToMenu()">MENU</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONSTANTES
// ═══════════════════════════════════════════════════════
const WORLD      = 3000;
const TILE       = 80;
const P_RADIUS   = 18;
const P_BASE_SPEED = 220;
const P_BASE_MAX_HP = 100;
const SPAWN_DIST = 620;

// ═══════════════════════════════════════════════════════
//  COLORES DE PERSONAJE
// ═══════════════════════════════════════════════════════
const PLAYER_COLORS = [
  { name: 'Verde',    light: '#5ee8bc', dark: '#1a7a5e', glow: '#4ecca3' },
  { name: 'Azul',     light: '#5eafe8', dark: '#1a5e7a', glow: '#4ea3cc' },
  { name: 'Rojo',     light: '#e85e6c', dark: '#7a1a28', glow: '#cc4e5a' },
  { name: 'Morado',   light: '#b85ee8', dark: '#5a1a7a', glow: '#a04ecc' },
  { name: 'Naranja',  light: '#e8a85e', dark: '#7a5a1a', glow: '#cca04e' },
  { name: 'Cyan',     light: '#5ee8e8', dark: '#1a7a7a', glow: '#4ecccc' },
  { name: 'Rosa',     light: '#e85eb8', dark: '#7a1a5a', glow: '#cc4ea0' },
  { name: 'Blanco',   light: '#e8e8e8', dark: '#7a7a7a', glow: '#cccccc' },
];
let selectedColor = 0;

// ═══════════════════════════════════════════════════════
//  ARMAS
// ═══════════════════════════════════════════════════════
const WEAPONS = {
  pistola: {
    name: 'Pistola',       icon: '🔫', color: '#ffe55a',
    fireRate: 0.22,  bulletSpeed: 580,  damage: 25,  bulletLife: 1.8,
    bulletRadius: 5, spread: 0,   count: 1,   pierce: 0,
    explosive: false, explosionRadius: 0,
    desc: 'Arma inicial equilibrada',
  },
  escopeta: {
    name: 'Escopeta',      icon: '💥', color: '#ff6b35',
    fireRate: 0.6,   bulletSpeed: 500,  damage: 18,  bulletLife: 0.9,
    bulletRadius: 4, spread: 0.35, count: 6,   pierce: 0,
    explosive: false, explosionRadius: 0,
    desc: '6 balas en abanico, devastadora de cerca',
  },
  rifle: {
    name: 'Rifle',         icon: '🎯', color: '#64b4ff',
    fireRate: 0.35,  bulletSpeed: 800,  damage: 40,  bulletLife: 2.5,
    bulletRadius: 4, spread: 0,   count: 1,   pierce: 3,
    explosive: false, explosionRadius: 0,
    desc: 'Perfora hasta 3 enemigos',
  },
  metralleta: {
    name: 'Metralleta',    icon: '🔥', color: '#f5a623',
    fireRate: 0.08,  bulletSpeed: 550,  damage: 12,  bulletLife: 1.4,
    bulletRadius: 3, spread: 0.15, count: 1,   pierce: 0,
    explosive: false, explosionRadius: 0,
    desc: 'Ráfaga rápida, bajo daño por bala',
  },
  lanzagranadas: {
    name: 'Lanzagranadas', icon: '💣', color: '#e94560',
    fireRate: 1.0,   bulletSpeed: 350,  damage: 60,  bulletLife: 1.5,
    bulletRadius: 8, spread: 0,   count: 1,   pierce: 0,
    explosive: true,  explosionRadius: 100,
    desc: 'Explosión en área, destrucción masiva',
  },
};
const WEAPON_UNLOCK_ORDER = ['escopeta','rifle','metralleta','lanzagranadas'];

// ═══════════════════════════════════════════════════════
//  ENEMIGOS (x3 dificultad base)
// ═══════════════════════════════════════════════════════
const ENEMY_TYPES = {
  normal: {
    name: 'Normal', radius: 20, baseHp: 150, baseSpeed: 110,
    damage: 25, color1: [10,100,65], color2: [10,90,28], xp: 8,
  },
  rapido: {
    name: 'Veloz', radius: 14, baseHp: 80, baseSpeed: 220,
    damage: 18, color1: [45,100,65], color2: [45,90,30], xp: 10,
  },
  tanque: {
    name: 'Tanque', radius: 32, baseHp: 450, baseSpeed: 65,
    damage: 45, color1: [280,80,55], color2: [280,70,25], xp: 20,
  },
  explosivo: {
    name: 'Kamikaze', radius: 16, baseHp: 100, baseSpeed: 180,
    damage: 60, color1: [55,100,60], color2: [40,100,30], xp: 12,
  },
  boss: {
    name: 'Jefe', radius: 50, baseHp: 2000, baseSpeed: 55,
    damage: 70, color1: [0,100,50], color2: [0,80,20], xp: 60,
  },
};

// ═══════════════════════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════════════════════
let canvas, ctx, W, H;
let dt = 0, lastTs = 0;
let gameState = 'menu'; // 'menu' | 'playing' | 'shop' | 'gameover'

let cam   = { x: 0, y: 0 };
let mouse = { x: 0, y: 0 };
let keys  = {};
let firing = false;

let player, bullets, enemies, particles, explosions, xpOrbs;
let wave, waveTimer, waveEnemiesLeft, waveBetween, waveAnnounce;
let nextWeaponIdx; // índice en WEAPON_UNLOCK_ORDER
let gameTime, stats;

function resetGame() {
  const c = PLAYER_COLORS[selectedColor];
  player = {
    x: WORLD / 2, y: WORLD / 2,
    angle: 0,
    hp: P_BASE_MAX_HP, maxHp: P_BASE_MAX_HP,
    speed: P_BASE_SPEED,
    fireCd: 0,
    hitFlash: 0,
    shake: 0,
    weapon: 'pistola',
    level: 1,
    xp: 0,
    xpToNext: 60,
    damageBonus: 0,
    speedBonus: 0,
    ownedWeapons: ['pistola'],
    colorLight: c.light,
    colorDark: c.dark,
    colorGlow: c.glow,
  };
  bullets    = [];
  enemies    = [];
  particles  = [];
  explosions = [];
  xpOrbs     = [];
  wave       = 0;
  waveTimer  = 2;
  waveEnemiesLeft = 0;
  waveBetween     = true;
  waveAnnounce    = 0;
  nextWeaponIdx   = 0;
  gameTime   = 0;
  firing     = false;
  stats = { kills: 0, damageDealt: 0, damageTaken: 0, shotsFired: 0, timeAlive: 0, maxWave: 0 };
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
window.onload = () => {
  canvas = document.getElementById('game');
  ctx    = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);

  // Color picker
  const colorContainer = document.getElementById('color-options');
  PLAYER_COLORS.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'color-opt' + (i === 0 ? ' selected' : '');
    div.style.background = `radial-gradient(circle at 35% 35%, ${c.light}, ${c.dark})`;
    div.onclick = () => {
      document.querySelectorAll('.color-opt').forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
      selectedColor = i;
    };
    colorContainer.appendChild(div);
  });

  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()))
      e.preventDefault();
    if (e.key >= '1' && e.key <= '5' && gameState === 'playing') {
      const idx = parseInt(e.key) - 1;
      if (idx < player.ownedWeapons.length) player.weapon = player.ownedWeapons[idx];
    }
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
  canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  canvas.addEventListener('mousedown', e => { if (e.button === 0) firing = true; });
  canvas.addEventListener('mouseup', e => { if (e.button === 0) firing = false; });
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  resetGame();
  requestAnimationFrame(loop);
};

function resize() {
  canvas.width  = W = window.innerWidth;
  canvas.height = H = window.innerHeight;
}

// ── Navegación ──
function startFromMenu() {
  document.getElementById('menu-overlay').classList.remove('open');
  resetGame();
  gameState = 'playing';
}
function retryGame() {
  document.getElementById('gameover-overlay').classList.remove('open');
  resetGame();
  gameState = 'playing';
}
function goToMenu() {
  document.getElementById('gameover-overlay').classList.remove('open');
  document.getElementById('menu-overlay').classList.add('open');
  gameState = 'menu';
}

// ═══════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════
function loop(ts) {
  dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  if (gameState === 'playing') update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════
function update(dt) {
  gameTime += dt;
  stats.timeAlive = gameTime;
  updatePlayer(dt);
  updateBullets(dt);
  updateEnemies(dt);
  updateExplosions(dt);
  updateXpOrbs(dt);
  updateParticles(dt);
  updateWaves(dt);
  updateCamera();
  checkLevelUp();
}

function updatePlayer(dt) {
  const p = player;
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup'])    dy -= 1;
  if (keys['s'] || keys['arrowdown'])  dy += 1;
  if (keys['a'] || keys['arrowleft'])  dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;
  const spd = p.speed + p.speedBonus;
  if (dx !== 0 || dy !== 0) {
    const len = Math.hypot(dx, dy);
    p.x += (dx / len) * spd * dt;
    p.y += (dy / len) * spd * dt;
  }
  p.x = clamp(p.x, P_RADIUS, WORLD - P_RADIUS);
  p.y = clamp(p.y, P_RADIUS, WORLD - P_RADIUS);

  const wx = mouse.x + cam.x, wy = mouse.y + cam.y;
  p.angle = Math.atan2(wy - p.y, wx - p.x);

  const wep = WEAPONS[p.weapon];
  p.fireCd -= dt;
  if (firing && p.fireCd <= 0) {
    shootWeapon(wep);
    p.fireCd = wep.fireRate;
  }
  p.hitFlash = Math.max(0, p.hitFlash - dt * 5);
  p.shake    = Math.max(0, p.shake    - dt * 8);
}

function shootWeapon(wep) {
  stats.shotsFired++;
  const a = player.angle;
  for (let i = 0; i < wep.count; i++) {
    const sa = wep.count > 1
      ? a - wep.spread + (wep.spread * 2 * i / (wep.count - 1))
      : a + (Math.random() - 0.5) * wep.spread;
    const gx = player.x + Math.cos(a) * (P_RADIUS + 10);
    const gy = player.y + Math.sin(a) * (P_RADIUS + 10);
    bullets.push({
      x: gx, y: gy,
      vx: Math.cos(sa) * wep.bulletSpeed,
      vy: Math.sin(sa) * wep.bulletSpeed,
      life: wep.bulletLife,
      damage: wep.damage + player.damageBonus,
      radius: wep.bulletRadius,
      pierce: wep.pierce, pierceCount: 0,
      explosive: wep.explosive,
      explosionRadius: wep.explosionRadius,
      color: wep.color,
      dead: false,
    });
  }
}

// ── Bullets ─────────────────────────────────────────
function updateBullets(dt) {
  for (const b of bullets) {
    if (b.dead) continue;
    b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
    if (b.life <= 0 || b.x < -50 || b.x > WORLD+50 || b.y < -50 || b.y > WORLD+50) {
      if (b.explosive && b.life <= 0) spawnExplosion(b.x, b.y, b.explosionRadius, b.damage);
      b.dead = true; continue;
    }
    for (const e of enemies) {
      if (e.dead) continue;
      if (dist(b.x, b.y, e.x, e.y) < b.radius + e.radius) {
        e.hp -= b.damage;
        stats.damageDealt += b.damage;
        spawnParticles(b.x, b.y, b.color, 4, 60, 130, 0.2);
        if (e.hp <= 0) killEnemy(e);
        b.pierceCount++;
        if (b.explosive) { spawnExplosion(b.x, b.y, b.explosionRadius, b.damage); b.dead = true; break; }
        if (b.pierceCount > b.pierce) { b.dead = true; break; }
      }
    }
  }
  bullets = bullets.filter(b => !b.dead);
}

// ── Explosions ──────────────────────────────────────
function spawnExplosion(x, y, radius, damage) {
  explosions.push({ x, y, radius, maxRadius: radius, life: 0.3, maxLife: 0.3 });
  spawnParticles(x, y, '#ff4444', 20, 100, 300, 0.5, true);
  for (const e of enemies) {
    if (e.dead) continue;
    if (dist(x, y, e.x, e.y) < radius + e.radius) {
      e.hp -= damage * 0.6;
      if (e.hp <= 0) killEnemy(e);
    }
  }
}
function updateExplosions(dt) {
  for (const ex of explosions) ex.life -= dt;
  explosions = explosions.filter(ex => ex.life > 0);
}

// ── Enemies ─────────────────────────────────────────
function updateEnemies(dt) {
  const len = enemies.length;
  for (let i = 0; i < len; i++) {
    const e = enemies[i];
    if (e.dead) continue;
    const dx = player.x - e.x, dy = player.y - e.y;
    const d = Math.hypot(dx, dy);
    if (d > 0) { e.x += (dx/d)*e.speed*dt; e.y += (dy/d)*e.speed*dt; }

    for (let j = i+1; j < len; j++) {
      const o = enemies[j];
      if (o.dead) continue;
      const ex = e.x-o.x, ey = e.y-o.y, ed = Math.hypot(ex,ey);
      const minD = (e.radius+o.radius)*1.1;
      if (ed < minD && ed > 0) {
        const push = (minD-ed)*0.3;
        const px = (ex/ed)*push, py = (ey/ed)*push;
        e.x += px; e.y += py; o.x -= px; o.y -= py;
      }
    }

    if (dist(e.x, e.y, player.x, player.y) < e.radius + P_RADIUS) {
      if (e.damageCd <= 0) {
        if (e.type === 'explosivo') {
          spawnExplosion(e.x, e.y, 90, e.contactDmg);
          e.dead = true;
          player.hp -= e.contactDmg;
        } else {
          player.hp -= e.contactDmg;
        }
        stats.damageTaken += e.contactDmg;
        player.hitFlash = 1; player.shake = 0.4;
        e.damageCd = 0.5; // golpean más seguido
        if (player.hp <= 0) {
          player.hp = 0;
          stats.maxWave = wave;
          gameState = 'gameover';
          showGameOver();
        }
      }
    }
    e.damageCd = Math.max(0, e.damageCd - dt);
  }
  enemies = enemies.filter(e => !e.dead);
}

function killEnemy(e) {
  e.dead = true;
  stats.kills++;
  xpOrbs.push({ x: e.x, y: e.y, xp: e.xpValue, life: 10, radius: 5 + Math.min(e.xpValue/15,5) });
  spawnParticles(e.x, e.y, null, 10 + e.radius/4, 80, 220, 0.4, true);
}

// ── XP ──────────────────────────────────────────────
function updateXpOrbs(dt) {
  for (const o of xpOrbs) {
    o.life -= dt;
    const d = dist(o.x, o.y, player.x, player.y);
    if (d < 120) {
      const pull = Math.max(0, (120-d)/120) * 500;
      const dx = player.x-o.x, dy = player.y-o.y, dn = Math.hypot(dx,dy);
      if (dn > 0) { o.x += (dx/dn)*pull*dt; o.y += (dy/dn)*pull*dt; }
    }
    if (d < P_RADIUS + o.radius) {
      player.xp += o.xp;
      spawnParticles(o.x, o.y, player.colorGlow, 5, 40, 100, 0.2);
      o.life = 0;
    }
  }
  xpOrbs = xpOrbs.filter(o => o.life > 0);
}

function checkLevelUp() {
  if (player.xp >= player.xpToNext) {
    player.xp -= player.xpToNext;
    player.level++;
    // XP crece agresivamente
    player.xpToNext = Math.floor(60 * Math.pow(1.5, player.level - 1));
  }
}

// ── Waves (DIFICULTAD BRUTAL) ───────────────────────
function updateWaves(dt) {
  if (waveAnnounce > 0) waveAnnounce -= dt;
  if (waveBetween) {
    waveTimer -= dt;
    if (waveTimer <= 0) {
      wave++;
      stats.maxWave = wave;
      waveBetween = false;
      waveAnnounce = 2.5;
      startWave();
    }
  } else {
    if (waveEnemiesLeft > 0) {
      waveTimer -= dt;
      if (waveTimer <= 0) {
        spawnWaveEnemy();
        waveEnemiesLeft--;
        // Spawn más rápido en oleadas altas
        waveTimer = Math.max(0.08, 0.8 - wave * 0.035);
      }
    } else if (enemies.length === 0) {
      waveBetween = true;
      waveTimer = 0.3; // Casi sin descanso
      openWaveShop();
    }
  }
}

function startWave() {
  // Curva de enemigos BRUTAL
  let count;
  if (wave <= 5) {
    count = 8 + wave * 5;
  } else if (wave <= 10) {
    count = 30 + (wave - 5) * 10;
  } else if (wave <= 15) {
    count = 80 + (wave - 10) * 15;
  } else {
    count = 155 + (wave - 15) * 25 + Math.floor(Math.pow(wave - 15, 1.5) * 5);
  }
  waveEnemiesLeft = count;
  waveTimer = 0.3;
}

function spawnWaveEnemy() {
  let type = 'normal';
  const roll = Math.random();

  if (wave <= 3) {
    if (roll < 0.2) type = 'rapido';
  } else if (wave <= 6) {
    if (roll < 0.08) type = 'boss';
    else if (roll < 0.2) type = 'tanque';
    else if (roll < 0.4) type = 'rapido';
    else if (roll < 0.5) type = 'explosivo';
  } else if (wave <= 10) {
    if (roll < 0.1) type = 'boss';
    else if (roll < 0.3) type = 'tanque';
    else if (roll < 0.5) type = 'rapido';
    else if (roll < 0.65) type = 'explosivo';
  } else {
    // Después de oleada 10: INFIERNO
    if (roll < 0.12) type = 'boss';
    else if (roll < 0.35) type = 'tanque';
    else if (roll < 0.55) type = 'explosivo';
    else if (roll < 0.75) type = 'rapido';
  }

  const et = ENEMY_TYPES[type];
  const angle = Math.random() * Math.PI * 2;
  const d = SPAWN_DIST + Math.random() * 100;
  const x = clamp(player.x + Math.cos(angle)*d, et.radius, WORLD-et.radius);
  const y = clamp(player.y + Math.sin(angle)*d, et.radius, WORLD-et.radius);

  // Escalado AGRESIVO: +30% stats por oleada, exponencial después de 10
  let scale = 1 + (wave - 1) * 0.3;
  if (wave > 10) scale += Math.pow(wave - 10, 1.4) * 0.2;
  if (wave > 15) scale += Math.pow(wave - 15, 1.6) * 0.15;

  enemies.push({
    x, y, type,
    radius: et.radius + (type === 'boss' && wave > 10 ? Math.min(wave - 10, 20) : 0),
    hp: Math.floor(et.baseHp * scale),
    maxHp: Math.floor(et.baseHp * scale),
    speed: et.baseSpeed + Math.random() * 15 + wave * 4 + (wave > 10 ? (wave-10)*6 : 0),
    contactDmg: Math.floor((et.damage + wave * 3) * (wave > 10 ? 1 + (wave-10)*0.15 : 1)),
    damageCd: 0,
    xpValue: Math.floor(et.xp * (1 + wave * 0.03)),
    color1: et.color1, color2: et.color2,
    dead: false,
  });
}

// ── Particles ────────────────────────────────────────
function spawnParticles(x, y, color, count, minS, maxS, life, death = false) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = minS + Math.random() * (maxS - minS);
    const c = death ? `hsl(${5+Math.random()*30},100%,${50+Math.random()*20}%)` : color;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life, maxLife: life,
      r: death ? 3+Math.random()*5 : 2+Math.random()*2, color: c });
  }
}
function updateParticles(dt) {
  for (const p of particles) { p.x += p.vx*dt; p.y += p.vy*dt; p.vx *= 0.9; p.vy *= 0.9; p.life -= dt; }
  particles = particles.filter(p => p.life > 0);
}

// ── Camera ───────────────────────────────────────────
function updateCamera() {
  const sx = player.shake > 0 ? (Math.random()-0.5)*14*player.shake : 0;
  const sy = player.shake > 0 ? (Math.random()-0.5)*14*player.shake : 0;
  cam.x = player.x - W/2 + sx;
  cam.y = player.y - H/2 + sy;
}

// ═══════════════════════════════════════════════════════
//  TIENDA (basada en oleadas)
// ═══════════════════════════════════════════════════════
function openWaveShop() {
  gameState = 'shop';
  firing = false;
  const offers = generateWaveOffers();
  renderShopCards(offers);
  document.getElementById('shop-wave-info').textContent = `Oleada ${wave} completada`;
  document.getElementById('shop-overlay').classList.add('open');
}

function closeShop() {
  document.getElementById('shop-overlay').classList.remove('open');
  gameState = 'playing';
}

function generateWaveOffers() {
  const offers = [];
  const isWeaponWave = (wave % 3 === 0) && nextWeaponIdx < WEAPON_UNLOCK_ORDER.length;
  const isFullHealWave = (wave === 10);

  if (isWeaponWave) {
    // Oleada de arma: ofrecer la siguiente arma
    const wid = WEAPON_UNLOCK_ORDER[nextWeaponIdx];
    const w = WEAPONS[wid];
    offers.push({
      type: 'new_weapon', id: wid,
      icon: w.icon, title: w.name,
      desc: w.desc, tag: 'NUEVA ARMA', tagClass: 'tag-new',
    });
    // También ofrecer curar 10
    offers.push({
      type: 'heal_small', icon: '💊', title: 'Curar +10 HP',
      desc: 'Recupera 10 puntos de vida', tag: 'CURAR', tagClass: 'tag-heal',
    });
  } else if (isFullHealWave) {
    // Oleada 10: cura completa (ÚNICA VEZ)
    offers.push({
      type: 'heal_full', icon: '❤️‍🩹', title: 'Curación Total',
      desc: 'Recupera toda tu vida. Solo esta vez.', tag: 'ESPECIAL', tagClass: 'tag-heal',
    });
    offers.push({
      type: 'heal_small', icon: '💊', title: 'Curar +10 HP',
      desc: 'Recupera 10 puntos de vida', tag: 'CURAR', tagClass: 'tag-heal',
    });
  } else {
    // Oleadas normales: solo curar 10 o saltar
    offers.push({
      type: 'heal_small', icon: '💊', title: 'Curar +10 HP',
      desc: 'Recupera 10 puntos de vida', tag: 'CURAR', tagClass: 'tag-heal',
    });
    offers.push({
      type: 'skip', icon: '⏭️', title: 'Continuar',
      desc: 'Saltar a la siguiente oleada', tag: 'SALTAR', tagClass: 'tag-skip',
    });
  }

  return offers;
}

function renderShopCards(offers) {
  const container = document.getElementById('shop-cards');
  container.innerHTML = '';
  for (let i = 0; i < offers.length; i++) {
    const o = offers[i];
    const card = document.createElement('div');
    card.className = 'shop-card';
    card.innerHTML = `
      <div class="card-icon">${o.icon}</div>
      <div class="card-title">${o.title}</div>
      <div class="card-desc">${o.desc}</div>
      <span class="card-tag ${o.tagClass}">${o.tag}</span>
    `;
    card.onclick = () => selectWaveOffer(o);
    container.appendChild(card);
  }
}

function selectWaveOffer(o) {
  switch (o.type) {
    case 'new_weapon':
      player.ownedWeapons.push(o.id);
      player.weapon = o.id;
      nextWeaponIdx++;
      break;
    case 'heal_small':
      player.hp = Math.min(player.hp + 10, player.maxHp);
      break;
    case 'heal_full':
      player.hp = player.maxHp;
      break;
    case 'skip':
      break;
  }
  closeShop();
}

// ═══════════════════════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════════════════════
function showGameOver() {
  const container = document.getElementById('go-stats');
  const m = Math.floor(stats.timeAlive/60), s = Math.floor(stats.timeAlive%60);
  container.innerHTML = [
    ['Oleada alcanzada', stats.maxWave],
    ['Monstruos eliminados', stats.kills],
    ['Nivel alcanzado', player.level],
    ['Daño infligido', stats.damageDealt],
    ['Daño recibido', stats.damageTaken],
    ['Disparos', stats.shotsFired],
    ['Tiempo', `${m}m ${s}s`],
  ].map(([l,v]) => `<div class="go-stat-row"><span class="go-label">${l}</span><span class="go-value">${v}</span></div>`).join('');
  document.getElementById('gameover-overlay').classList.add('open');
}

// ═══════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════
function draw() {
  ctx.clearRect(0, 0, W, H);

  if (gameState === 'menu') {
    // Fondo animado del menú
    drawMenuBg();
    return;
  }

  ctx.save();
  ctx.translate(-cam.x, -cam.y);
  drawWorld();
  drawXpOrbs();
  drawParticlesBehind();
  drawExplosions();
  drawBullets();
  drawEnemies();
  drawPlayer();
  ctx.restore();
  drawHUD();
  if (waveAnnounce > 0 && gameState === 'playing') drawWaveAnnounce();
}

function drawMenuBg() {
  ctx.fillStyle = '#0a0d12';
  ctx.fillRect(0, 0, W, H);
  const t = Date.now() * 0.001;
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  for (let x = -TILE; x < W + TILE; x += TILE) {
    const off = Math.sin(t + x * 0.01) * 10;
    ctx.beginPath(); ctx.moveTo(x, off); ctx.lineTo(x, H + off); ctx.stroke();
  }
  for (let y = -TILE; y < H + TILE; y += TILE) {
    const off = Math.cos(t + y * 0.01) * 10;
    ctx.beginPath(); ctx.moveTo(off, y); ctx.lineTo(W + off, y); ctx.stroke();
  }
}

function drawWorld() {
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(cam.x, cam.y, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.035)';
  ctx.lineWidth = 1;
  const sx = Math.floor(cam.x/TILE)*TILE, sy = Math.floor(cam.y/TILE)*TILE;
  for (let x = sx; x < cam.x+W+TILE; x += TILE) { ctx.beginPath(); ctx.moveTo(x,cam.y); ctx.lineTo(x,cam.y+H); ctx.stroke(); }
  for (let y = sy; y < cam.y+H+TILE; y += TILE) { ctx.beginPath(); ctx.moveTo(cam.x,y); ctx.lineTo(cam.x+W,y); ctx.stroke(); }
  ctx.strokeStyle = 'rgba(100,200,255,0.12)'; ctx.lineWidth = 6;
  ctx.strokeRect(0, 0, WORLD, WORLD);
}

function drawPlayer() {
  const p = player;
  const wep = WEAPONS[p.weapon];
  ctx.save();
  ctx.translate(p.x, p.y);

  ctx.beginPath(); ctx.arc(4, 6, P_RADIUS, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();

  if (p.hitFlash > 0) {
    ctx.beginPath(); ctx.arc(0, 0, P_RADIUS+8, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,60,60,${p.hitFlash*0.45})`; ctx.fill();
  }

  ctx.save(); ctx.rotate(p.angle);
  const bW = wep.explosive ? 16 : (wep.count > 3 ? 14 : 12);
  const bL = wep.explosive ? 18 : (wep.bulletSpeed > 700 ? 26 : 22);
  ctx.fillStyle = '#6a6a6a'; ctx.fillRect(P_RADIUS-2, -bW/2, bL, bW);
  ctx.fillStyle = '#999'; ctx.fillRect(P_RADIUS, -bW/2+2, bL-2, bW-4);
  ctx.fillStyle = '#444'; ctx.fillRect(P_RADIUS+bL-4, -bW/2-1, 5, bW+2);
  ctx.restore();

  const g = ctx.createRadialGradient(-5, -5, 2, 0, 0, P_RADIUS);
  if (p.hitFlash > 0) {
    g.addColorStop(0, `rgba(255,${Math.floor(100*(1-p.hitFlash))},${Math.floor(100*(1-p.hitFlash))},1)`);
    g.addColorStop(1, 'rgba(180,20,20,1)');
  } else {
    g.addColorStop(0, p.colorLight);
    g.addColorStop(1, p.colorDark);
  }
  ctx.beginPath(); ctx.arc(0, 0, P_RADIUS, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2; ctx.stroke();

  ctx.save(); ctx.rotate(p.angle);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(P_RADIUS-6, 0, 4, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.restore();
}

function drawEnemies() {
  for (const e of enemies) {
    if (e.dead) continue;
    const hpR = e.hp/e.maxHp;
    const toP = Math.atan2(player.y-e.y, player.x-e.x);
    ctx.save(); ctx.translate(e.x, e.y);

    const gc = e.type === 'boss' ? 'rgba(255,0,0,0.2)' : e.type === 'explosivo' ? 'rgba(200,200,0,0.15)' : 'rgba(220,40,40,0.10)';
    ctx.beginPath(); ctx.arc(0, 0, e.radius+5, 0, Math.PI*2);
    ctx.fillStyle = gc; ctx.fill();

    const [h1,s1,l1] = e.color1, [h2,s2,l2] = e.color2;
    const eg = ctx.createRadialGradient(-4,-4,2,0,0,e.radius);
    eg.addColorStop(0, `hsl(${h1},${s1}%,${l1}%)`);
    eg.addColorStop(1, `hsl(${h2},${s2}%,${l2}%)`);
    ctx.beginPath(); ctx.arc(0,0,e.radius,0,Math.PI*2);
    ctx.fillStyle = eg; ctx.fill();

    if (e.type === 'boss') {
      ctx.strokeStyle = `rgba(255,50,50,${0.5+Math.sin(gameTime*5)*0.3})`;
      ctx.lineWidth = 3; ctx.stroke();
    } else {
      ctx.strokeStyle = `hsla(${h1},${s1}%,60%,0.4)`;
      ctx.lineWidth = 1.5; ctx.stroke();
    }

    ctx.rotate(toP);
    const eO = e.radius*0.35, eR = e.radius*0.2, pR = eR*0.55;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(eO,-eO*0.7,eR,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eO,eO*0.7,eR,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a0000';
    ctx.beginPath(); ctx.arc(eO+pR*0.4,-eO*0.7,pR,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eO+pR*0.4,eO*0.7,pR,0,Math.PI*2); ctx.fill();

    if (e.type === 'explosivo') {
      ctx.rotate(-toP);
      ctx.fillStyle = `rgba(255,255,0,${0.5+Math.sin(gameTime*10)*0.5})`;
      ctx.font = `bold ${e.radius}px monospace`; ctx.textAlign = 'center';
      ctx.fillText('!', 0, e.radius*0.35);
    }
    ctx.restore();

    if (hpR < 1) {
      const bw = e.radius*2.5, bh = e.type==='boss'?8:5;
      const bx = e.x-bw/2, by = e.y-e.radius-12;
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(bx-1,by-1,bw+2,bh+2);
      ctx.fillStyle = '#300'; ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle = `hsl(${hpR*120},100%,42%)`; ctx.fillRect(bx,by,bw*hpR,bh);
    }
  }
}

function drawXpOrbs() {
  for (const o of xpOrbs) {
    const pulse = 1+Math.sin(gameTime*6+o.x)*0.15;
    ctx.beginPath(); ctx.arc(o.x,o.y,o.radius*pulse+4,0,Math.PI*2);
    ctx.fillStyle = 'rgba(78,204,163,0.15)'; ctx.fill();
    ctx.beginPath(); ctx.arc(o.x,o.y,o.radius*pulse,0,Math.PI*2);
    const og = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.radius*pulse);
    og.addColorStop(0,'#aaffdd'); og.addColorStop(1,'#4ecca3');
    ctx.fillStyle = og; ctx.fill();
  }
}

function drawExplosions() {
  for (const ex of explosions) {
    const t = 1-ex.life/ex.maxLife, r = ex.maxRadius*(0.3+t*0.7);
    ctx.save(); ctx.globalAlpha = (1-t)*0.6;
    ctx.beginPath(); ctx.arc(ex.x,ex.y,r,0,Math.PI*2);
    const eg = ctx.createRadialGradient(ex.x,ex.y,0,ex.x,ex.y,r);
    eg.addColorStop(0,'rgba(255,220,50,1)'); eg.addColorStop(0.4,'rgba(255,80,20,0.8)'); eg.addColorStop(1,'rgba(200,0,0,0)');
    ctx.fillStyle = eg; ctx.fill(); ctx.restore();
  }
}

function drawBullets() {
  for (const b of bullets) {
    const spd = Math.hypot(b.vx,b.vy);
    const tx = b.x-(b.vx/spd)*20, ty = b.y-(b.vy/spd)*20;
    const tr = ctx.createLinearGradient(b.x,b.y,tx,ty);
    tr.addColorStop(0, b.color||'rgba(255,220,60,0.8)'); tr.addColorStop(1,'rgba(255,80,0,0)');
    ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(tx,ty);
    ctx.strokeStyle = tr; ctx.lineWidth = b.radius*1.6; ctx.lineCap = 'round'; ctx.stroke();
    ctx.beginPath(); ctx.arc(b.x,b.y,b.radius+3,0,Math.PI*2);
    ctx.fillStyle = `${b.color||'#ffe55a'}33`; ctx.fill();
    ctx.beginPath(); ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
    ctx.fillStyle = b.color||'#ffe55a'; ctx.fill();
  }
}

function drawParticlesBehind() {
  for (const p of particles) {
    const a = Math.max(0,p.life/p.maxLife);
    ctx.save(); ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);
    ctx.fillStyle = p.color; ctx.fill(); ctx.restore();
  }
}

// ── HUD ──────────────────────────────────────────────
function drawHUD() {
  const p = player;
  const wep = WEAPONS[p.weapon];

  // HP
  const bx = 20, by = H-80;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(ctx, bx-8, by-24, 256, 90, 8); ctx.fill();
  const hpR = p.hp/p.maxHp;
  const hpC = hpR > 0.5 ? player.colorGlow : hpR > 0.25 ? '#f5a623' : '#e94560';
  ctx.fillStyle = hpC; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'left';
  ctx.fillText('VIDA', bx, by-8);
  ctx.fillStyle = '#666'; ctx.textAlign = 'right';
  ctx.fillText(`${p.hp} / ${p.maxHp}`, bx+240, by-8);
  ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fillRect(bx,by,240,16);
  ctx.fillStyle = hpC; ctx.fillRect(bx,by,240*hpR,16);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; ctx.strokeRect(bx,by,240,16);

  // XP
  const xpR = p.xp/p.xpToNext;
  ctx.fillStyle = '#64b4ff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'left';
  ctx.fillText(`XP  NIV ${p.level}`, bx, by+30);
  ctx.fillStyle = '#666'; ctx.textAlign = 'right';
  ctx.fillText(`${p.xp} / ${p.xpToNext}`, bx+240, by+30);
  ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fillRect(bx,by+36,240,12);
  ctx.fillStyle = '#2a6aaa'; ctx.fillRect(bx,by+36,240*xpR,12);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.strokeRect(bx,by+36,240,12);

  // Arma
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(ctx, W-200, H-80, 180, 68, 8); ctx.fill();
  ctx.fillStyle = wep.color; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center';
  ctx.fillText(wep.icon, W-110, H-48);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 13px monospace';
  ctx.fillText(wep.name.toUpperCase(), W-110, H-28);
  ctx.fillStyle = '#666'; ctx.font = '10px monospace';
  ctx.fillText(`DMG: ${wep.damage+p.damageBonus}`, W-110, H-16);

  if (p.ownedWeapons.length > 1) {
    const wy2 = H-100;
    for (let i = 0; i < p.ownedWeapons.length; i++) {
      const wid = p.ownedWeapons[i], wi = WEAPONS[wid];
      const wx2 = W-200+i*36;
      const active = wid === p.weapon;
      ctx.fillStyle = active ? 'rgba(255,229,90,0.2)' : 'rgba(0,0,0,0.4)';
      roundRect(ctx,wx2,wy2,32,32,6); ctx.fill();
      if (active) { ctx.strokeStyle = '#ffe55a'; ctx.lineWidth = 2; roundRect(ctx,wx2,wy2,32,32,6); ctx.stroke(); }
      ctx.fillStyle = '#fff'; ctx.font = '16px monospace'; ctx.textAlign = 'center';
      ctx.fillText(wi.icon, wx2+16, wy2+22);
      ctx.fillStyle = '#888'; ctx.font = '9px monospace';
      ctx.fillText(i+1, wx2+16, wy2-3);
    }
  }

  // Oleada
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, W/2-80, 14, 160, 42, 8); ctx.fill();
  ctx.fillStyle = '#e94560'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center';
  ctx.fillText(`OLEADA ${wave}`, W/2, 43);

  // Próxima arma
  if (nextWeaponIdx < WEAPON_UNLOCK_ORDER.length) {
    const nextWaveForWeapon = Math.ceil(wave / 3) * 3;
    const wavesLeft = nextWaveForWeapon > wave ? nextWaveForWeapon - wave : 3;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, W/2-80, 60, 160, 22, 6); ctx.fill();
    ctx.fillStyle = '#64b4ff'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`ARMA EN ${wavesLeft} OLEADA${wavesLeft > 1 ? 'S' : ''}`, W/2, 75);
  }

  // Kills
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, W-140, 14, 118, 52, 8); ctx.fill();
  ctx.fillStyle = '#e94560'; ctx.font = 'bold 34px monospace'; ctx.textAlign = 'right';
  ctx.fillText(stats.kills, W-22, 55);
  ctx.fillStyle = '#888'; ctx.font = '10px monospace';
  ctx.fillText('KILLS', W-22, 30);

  // Info
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, 14, 14, 160, 52, 8); ctx.fill();
  ctx.fillStyle = 'rgba(255,80,80,0.85)'; ctx.font = 'bold 13px monospace'; ctx.textAlign = 'left';
  ctx.fillText(`ENEMIGOS: ${enemies.length}`, 22, 34);
  const mn = Math.floor(gameTime/60), sc = Math.floor(gameTime%60);
  ctx.fillStyle = '#aaa'; ctx.font = '11px monospace';
  ctx.fillText(`TIEMPO: ${mn}:${sc.toString().padStart(2,'0')}`, 22, 52);
}

function drawWaveAnnounce() {
  const alpha = waveAnnounce > 2 ? (2.5-waveAnnounce)*2 : Math.min(1,waveAnnounce/1.5);
  ctx.save(); ctx.globalAlpha = alpha; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0,H/2-60,W,120);
  ctx.fillStyle = '#e94560'; ctx.font = 'bold 50px monospace';
  ctx.fillText(`OLEADA ${wave}`, W/2, H/2+8);
  if (wave >= 5 && wave % 5 === 0) {
    ctx.fillStyle = '#ffe55a'; ctx.font = 'bold 20px monospace';
    ctx.fillText(wave >= 10 ? 'INFIERNO' : 'JEFE APARECE', W/2, H/2+40);
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function dist(x1,y1,x2,y2) { return Math.hypot(x2-x1,y2-y1); }
function clamp(v,lo,hi) { return v < lo ? lo : v > hi ? hi : v; }
function shuffle(a) { for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } }

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
