<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piedra, Papel o Tijera</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.3rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #e94560, #0f3460, #533483);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(233,69,96,0.4));
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .scoreboard {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
      background: rgba(255,255,255,0.05);
      padding: 1rem 2.5rem;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .score-item {
      text-align: center;
    }

    .score-item .label {
      font-size: 0.75rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-item .value {
      font-size: 2rem;
      font-weight: bold;
    }

    .score-item.player .value { color: #4ecca3; }
    .score-item.draws .value  { color: #f5a623; }
    .score-item.cpu .value    { color: #e94560; }

    .arena {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .side-label {
      font-size: 0.8rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .choice-display {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      border: 3px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      transition: all 0.3s ease;
    }

    .choice-display.player-side { border-color: #4ecca3; box-shadow: 0 0 20px rgba(78,204,163,0.2); }
    .choice-display.cpu-side    { border-color: #e94560; box-shadow: 0 0 20px rgba(233,69,96,0.2); }
    .choice-display.shake       { animation: shake 0.4s ease; }

    @keyframes shake {
      0%,100% { transform: scale(1); }
      25%      { transform: scale(1.2) rotate(-10deg); }
      75%      { transform: scale(1.2) rotate(10deg); }
    }

    .vs {
      font-size: 1.5rem;
      font-weight: bold;
      color: #555;
    }

    .result-banner {
      font-size: 1.6rem;
      font-weight: bold;
      min-height: 2.2rem;
      margin-bottom: 1.5rem;
      transition: all 0.3s ease;
    }

    .result-banner.win   { color: #4ecca3; text-shadow: 0 0 12px rgba(78,204,163,0.6); }
    .result-banner.lose  { color: #e94560; text-shadow: 0 0 12px rgba(233,69,96,0.6); }
    .result-banner.draw  { color: #f5a623; text-shadow: 0 0 12px rgba(245,166,35,0.6); }

    .buttons {
      display: flex;
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      font-size: 2.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .btn span.btn-label {
      font-size: 0.5rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      transform: translateY(-6px) scale(1.1);
      border-color: #fff;
      background: rgba(255,255,255,0.15);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .reset-btn {
      padding: 0.6rem 1.8rem;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 1px;
    }

    .reset-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .history {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 320px;
    }

    .history-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .history-dot.win  { background: #4ecca3; }
    .history-dot.lose { background: #e94560; }
    .history-dot.draw { background: #f5a623; }
  </style>
</head>
<body>

  <h1>Piedra · Papel · Tijera</h1>
  <p class="subtitle">Elige tu jugada</p>

  <div class="scoreboard">
    <div class="score-item player">
      <div class="label">Tu puntaje</div>
      <div class="value" id="player-score">0</div>
    </div>
    <div class="score-item draws">
      <div class="label">Empates</div>
      <div class="value" id="draw-score">0</div>
    </div>
    <div class="score-item cpu">
      <div class="label">CPU</div>
      <div class="value" id="cpu-score">0</div>
    </div>
  </div>

  <div class="arena">
    <div class="side">
      <div class="side-label">Tu jugada</div>
      <div class="choice-display player-side" id="player-display">❓</div>
    </div>
    <div class="vs">VS</div>
    <div class="side">
      <div class="side-label">CPU</div>
      <div class="choice-display cpu-side" id="cpu-display">❓</div>
    </div>
  </div>

  <div class="result-banner" id="result-banner">&nbsp;</div>

  <div class="buttons">
    <button class="btn" onclick="play('piedra')" id="btn-piedra">
      🪨<span class="btn-label">Piedra</span>
    </button>
    <button class="btn" onclick="play('papel')" id="btn-papel">
      📄<span class="btn-label">Papel</span>
    </button>
    <button class="btn" onclick="play('tijera')" id="btn-tijera">
      ✂️<span class="btn-label">Tijera</span>
    </button>
  </div>

  <button class="reset-btn" onclick="resetGame()">Reiniciar</button>

  <div class="history" id="history"></div>

  <script>
    const emojis = { piedra: '🪨', papel: '📄', tijera: '✂️' };
    const opciones = ['piedra', 'papel', 'tijera'];

    let scores = { player: 0, cpu: 0, draw: 0 };
    let history = [];
    let playing = false;

    function play(choice) {
      if (playing) return;
      playing = true;

      const buttons = document.querySelectorAll('.btn');
      buttons.forEach(b => b.disabled = true);

      const playerDisplay = document.getElementById('player-display');
      const cpuDisplay = document.getElementById('cpu-display');
      const resultBanner = document.getElementById('result-banner');

      playerDisplay.textContent = emojis[choice];
      cpuDisplay.textContent = '❓';
      resultBanner.className = 'result-banner';
      resultBanner.innerHTML = '&nbsp;';

      // Animacion de "pensando"
      let ticks = 0;
      const interval = setInterval(() => {
        cpuDisplay.textContent = emojis[opciones[ticks % 3]];
        cpuDisplay.classList.toggle('shake');
        ticks++;
      }, 120);

      setTimeout(() => {
        clearInterval(interval);
        cpuDisplay.classList.remove('shake');

        const cpuChoice = opciones[Math.floor(Math.random() * 3)];
        cpuDisplay.textContent = emojis[cpuChoice];

        const result = getResult(choice, cpuChoice);

        if (result === 'win') {
          scores.player++;
          resultBanner.textContent = '¡Ganaste! 🎉';
          resultBanner.className = 'result-banner win';
        } else if (result === 'lose') {
          scores.cpu++;
          resultBanner.textContent = '¡Perdiste! 😔';
          resultBanner.className = 'result-banner lose';
        } else {
          scores.draw++;
          resultBanner.textContent = '¡Empate! 🤝';
          resultBanner.className = 'result-banner draw';
        }

        document.getElementById('player-score').textContent = scores.player;
        document.getElementById('cpu-score').textContent = scores.cpu;
        document.getElementById('draw-score').textContent = scores.draw;

        history.push(result);
        renderHistory();

        buttons.forEach(b => b.disabled = false);
        playing = false;
      }, 900);
    }

    function getResult(player, cpu) {
      if (player === cpu) return 'draw';
      if (
        (player === 'piedra' && cpu === 'tijera') ||
        (player === 'papel'  && cpu === 'piedra') ||
        (player === 'tijera' && cpu === 'papel')
      ) return 'win';
      return 'lose';
    }

    function renderHistory() {
      const container = document.getElementById('history');
      container.innerHTML = history.slice(-30).map(r =>
        `<div class="history-dot ${r}"></div>`
      ).join('');
    }

    function resetGame() {
      scores = { player: 0, cpu: 0, draw: 0 };
      history = [];
      document.getElementById('player-score').textContent = '0';
      document.getElementById('cpu-score').textContent = '0';
      document.getElementById('draw-score').textContent = '0';
      document.getElementById('player-display').textContent = '❓';
      document.getElementById('cpu-display').textContent = '❓';
      const banner = document.getElementById('result-banner');
      banner.className = 'result-banner';
      banner.innerHTML = '&nbsp;';
      renderHistory();
    }
  </script>
</body>
</html>
